services:
  # --- SERVICIO DE BASE DE DATOS ---
  db:
    image: mirror.gcr.io/library/mysql:8.0
    container_name: mysql
    restart: always
    env_file: .env  # Lee el archivo .env
    environment:
      # Se pasan las variables a la imagen de MySQL
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306" # Mapea el puerto 3306 del contenedor al puerto 3307 en el PC
    volumes:
      - mysql_data:/var/lib/mysql # Esto hace que los datos no se borren al apagar docker
      - ./backend/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\" || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 40s

  # --- SERVICIO DE BACKEND (API) ---
  backend:
    build: ./backend # Construye la imagen usando el Dockerfile del backend
    container_name: backend
    restart: on-failure
    env_file: .env
    ports:
      - "5000:5000" # Mapea el puerto 5000 del contenedor al 5000 al PC
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app:z # Vincula la carpeta local con la del contenedor.
      - tourment_uploads:/app/uploads # Imágenes subidas (persistente, fuera del bind del código)

  # --- SERVICIO DE FRONTEND ---
  frontend:
    build: ./frontend
    container_name: frontend
    restart: on-failure
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app:z
      - /app/node_modules
    environment:
      - VITE_API_URL=http://backend:5000

  # --- SERVICIO DE PhpMyAdmin ---
  phpmyadmin:
    image: mirror.gcr.io/phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8080:80" # Acceso en http://localhost:8080
    environment:
      # Configuración para conectar con el servicio 'db'
      PMA_HOST: db # Usamos el nombre del servicio de la BDD
      PMA_PORT: 3306
      PMA_USER: ${MYSQL_USER}
      PMA_PASSWORD: ${MYSQL_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

# Definir el volumen para persistencia de datos
volumes:
  mysql_data:
  tourment_uploads:



